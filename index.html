<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDrive | GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --paper: #FBF7EE; --orange: #F26B1F; }
        body { background-color: var(--paper); font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // CHANGE THIS TO YOUR GITHUB DETAILS
        const GITHUB_USERNAME = "YOUR_USERNAME";
        const REPO_NAME = "udrive";
        const JSON_URL = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/fleet.json`;

        const App = () => {
            const [fleetData, setFleetData] = useState({ fleet: [], photos: {} });
            const [isAdminOpen, setIsAdminOpen] = useState(false);

            // Fetch data from GitHub on load
            useEffect(() => {
                fetch(JSON_URL)
                    .then(res => res.json())
                    .then(data => setFleetData(data))
                    .catch(err => console.log("No GitHub data found yet, using empty fleet."));
            }, []);

            return (
                <div>
                    <nav className="p-6 border-b flex justify-between items-center">
                        <span className="font-bold text-2xl">UDRIVE</span>
                        <button onClick={() => setIsAdminOpen(true)} className="text-sm opacity-50">Admin</button>
                    </nav>

                    <main className="p-6 grid md:grid-cols-3 gap-8 max-w-7xl mx-auto">
                        {fleetData.fleet.map(car => (
                            <div key={car.id} className="bg-white rounded-3xl overflow-hidden shadow-sm border">
                                <div className="h-48 bg-gray-100">
                                    {fleetData.photos[car.id] && <img src={fleetData.photos[car.id][0]} className="w-full h-full object-cover" />}
                                </div>
                                <div className="p-6">
                                    <h3 className="text-xl font-bold">{car.name}</h3>
                                    <p className="text-orange-600 font-bold">€{car.pricePerDay}/day</p>
                                    <button className="w-full bg-[#25D366] text-white py-3 rounded-xl mt-4 font-bold">WhatsApp Booking</button>
                                </div>
                            </div>
                        ))}
                    </main>

                    {isAdminOpen && (
                        <div className="fixed inset-0 bg-black/90 z-50 p-10 overflow-y-auto">
                            <div className="bg-white p-8 rounded-3xl max-w-2xl mx-auto">
                                <h2 className="text-2xl font-bold mb-4">Admin Mode</h2>
                                <p className="text-sm mb-6 text-gray-500">1. Edit your cars below.<br/>2. Click "Copy JSON Data".<br/>3. Paste it into your fleet.json file on GitHub.</p>
                                
                                <button 
                                    onClick={() => {
                                        navigator.clipboard.writeText(JSON.stringify(fleetData));
                                        alert("JSON Copied! Now paste it into GitHub.");
                                    }}
                                    className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold mb-4"
                                >
                                    📋 Copy JSON Data
                                </button>

                                {/* Simple Add Logic */}
                                <button onClick={() => {
                                    const newCar = { id: Date.now(), name: "New Car", pricePerDay: 60 };
                                    setFleetData({ ...fleetData, fleet: [...fleetData.fleet, newCar] });
                                }} className="block bg-black text-white px-6 py-2 rounded-lg mb-4">+ Add Car</button>

                                <button onClick={() => setIsAdminOpen(false)} className="text-red-500 font-bold">Close Admin</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
